fragment Blog on Blog {
  id
  title
  slug
  content {
    html
  }
  image {
    ...Asset
  }
  publishedAt
}

query Blogs($skip: Int, $first: Int) {
  blogs(skip: $skip, first: $first, orderBy: createdAt_DESC) {
    ...Blog
  }
}

query BlogPostBySlug($slug: String!) {
  blog(where: { slug: $slug }) {
    ...Blog
  }
}
